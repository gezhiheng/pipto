server {
  listen 80;
  server_name _;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = /playground {
    return 301 /playground/;
  }

  location /playground/ {
    try_files $uri $uri/ /playground/index.html;
  }

  location = /docs {
    return 301 /docs/;
  }

  location = /docs/zh {
    return 301 /docs/zh/;
  }

  location / {
    # Next static export writes docs pages as extensionless routes backed by .html files,
    # and may also emit directories with index.html (e.g. /docs/index.html).
    # Prefer "$uri/" first to avoid serving a directory as a file (403).
    try_files $uri/ $uri $uri.html /index.html;
  }
}
