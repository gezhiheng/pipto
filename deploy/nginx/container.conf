server {
  listen 80;
  server_name _;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = /playground {
    return 301 /playground/;
  }

  location /playground/ {
    try_files $uri $uri/ /playground/index.html;
  }

  location = /docs {
    try_files /docs.html =404;
  }

  location = /docs/ {
    try_files /docs.html =404;
  }

  location = /docs/zh {
    try_files /docs/zh.html =404;
  }

  location = /docs/zh/ {
    try_files /docs/zh.html =404;
  }

  location ~ ^/docs/(.+)/$ {
    # Static export emits docs pages as "/docs/<route>.html", but nested routes also
    # create sibling directories like "/docs/<route>/". When nginx picks the directory
    # first, a trailing-slash request becomes a directory lookup without index.html and
    # returns 403. Resolve trailing-slash docs URLs back to the exported HTML file first.
    try_files /docs/$1/index.html /docs/$1.html /index.html;
  }

  location / {
    # Prefer concrete files before directories so extensionless docs routes like "/docs"
    # resolve to "/docs.html" instead of a same-named directory that only stores children.
    try_files $uri $uri.html $uri/ /index.html;
  }
}
